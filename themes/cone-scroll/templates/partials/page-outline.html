{% import "macros/page_outline.html" as page_outline %}
{% set current_lang = lang | default(value=config.default_language) %}
<aside class="page-outline" data-page-outline aria-label="{{ trans(key='toc_label', lang=current_lang) }}">
  <details class="page-outline-panel" data-page-outline-panel open>
    <summary class="page-outline-toggle">{{ trans(key="outline_label", lang=current_lang) }}</summary>
    <nav class="page-outline-nav" data-page-outline-nav aria-label="{{ trans(key='toc_label', lang=current_lang) }}">
      {{ page_outline::render_nodes(nodes=page.toc) }}
    </nav>
  </details>
</aside>
